<style>
  /* ── Critical page-shell CSS ── */
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg-1); }
  body { font-family: var(--font-body); min-height: 100vh; }

  /* Skip-to-content link for a11y + Lighthouse */
  .skip { position: absolute; left: -9999px; top: 0; padding: 8px 12px; background: var(--signal); color: var(--n-0); border-radius: 0 0 6px 0; z-index: 999; }
  .skip:focus { left: 0; }

  /* Pulse animation used throughout */
  @keyframes ck-pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.4 } }

  /* Marquee scroll used in Specimen */
  @keyframes marquee { 0% { transform: translateX(0) } 100% { transform: translateX(-50%) } }

  /* Morph sweep */
  @keyframes be-sweep {
    0%,100% { --be-morph-t: 0; opacity: 1; }
    50%     { --be-morph-t: 1; opacity: 1; }
  }

  /* Tick for live clocks */
  @keyframes tick-in {
    from { opacity: 0; transform: translateY(2px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Reduce motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }

  /* App shell wrapper (prevents layout shift while React boots) */
  #app { min-height: 100vh; }

  .boot {
    position: fixed; inset: 0; display: grid; place-items: center;
    background: var(--bg); z-index: 1;
  }
  .boot-mark {
    width: 48px; height: 48px; border-radius: 999px;
    background: radial-gradient(circle, rgba(39,224,112,0.4) 0%, transparent 70%);
    animation: ck-pulse 1.4s ease-in-out infinite;
  }

  /* Selection */
  ::selection { background: var(--signal); color: var(--n-0); }

  /* Scrollbars (thin, dark-friendly) */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* Focus ring polish */
  :focus-visible { outline: none; box-shadow: 0 0 0 2px var(--bg), 0 0 0 4px rgba(39, 224, 112, 0.45); border-radius: 4px; }

  /* Tweaks panel transitions */
  .tweaks-panel { transition: transform var(--dur-3) var(--ease-out), opacity var(--dur-2) var(--ease-out); }

  /* Dotted grid underlay (toggleable) */
  .grid-bg::before {
    content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0.5;
    background-image:
      radial-gradient(circle, var(--border) 1px, transparent 1px);
    background-size: 24px 24px;
    mask-image: linear-gradient(to bottom, black 0%, black 60%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 60%, transparent 100%);
  }
</style>
